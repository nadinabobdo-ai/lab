<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة عقولٌ تصنع - إدارة البيانات المشفرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f7fb; color: #2d3748; }
        .glass-card { background: white; border-radius: 2.5rem; border: 1px solid #edf2f7; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .nav-btn { transition: all 0.3s ease; }
        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .secure-input { letter-spacing: 0.5em; text-align: center; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- شاشة البداية -->
    <div id="selectionScreen" class="max-w-2xl mx-auto py-16 text-center space-y-10">
        <div class="space-y-2">
            <h1 class="text-6xl font-black text-indigo-900 italic">عقولٌ تصنع 🚀</h1>
            <p class="text-slate-500 font-bold">بوابتكِ للتحليل الذكي والإبداع</p>
        </div>
        
        <div class="glass-card p-10 space-y-8 border-b-8 border-indigo-200">
            <div class="space-y-4">
                <label class="block text-right font-bold text-slate-700 pr-2">اختاري المختبر المتاح:</label>
                <select id="labSelect" onchange="refreshSelectionUI()" class="w-full p-5 rounded-2xl border-2 border-indigo-50 bg-slate-50 text-xl font-bold text-indigo-700 outline-none focus:ring-4 ring-indigo-100 transition-all">
                    <option value="">-- اختاري المختبر --</option>
                    <script>
                        for(let i=1; i<=15; i++) {
                            let lock = localStorage.getItem(`LOCKED_V21_${i}`) === 'true';
                            document.write(`<option value="${i}">${lock ? '🔒' : '🔓'} مختبر رقم ${i} ${lock ? '(محجوز)' : '(متاح)'}</option>`);
                        }
                    </script>
                </select>
            </div>
            
            <div id="actionArea" class="hidden grid grid-cols-1 gap-4 animate-in fade-in zoom-in duration-300"></div>

            <div class="pt-6 border-t">
                <button onclick="secureMasterReset()" class="text-xs text-slate-400 hover:text-red-500 underline font-bold transition-colors">تصفير النظام المشفر (للمديرة)</button>
            </div>
        </div>
    </div>

    <!-- لوحة التحكم (المعلمة) -->
    <div id="teacherPanel" class="hidden max-w-7xl mx-auto space-y-6">
        <header class="flex flex-col md:flex-row justify-between items-center glass-card p-8 gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl shadow-lg">L</div>
                <h2 class="text-2xl font-black">إدارة مختبر <span id="tLabNum" class="text-indigo-600"></span></h2>
            </div>
            <div class="flex flex-wrap gap-3 justify-center">
                <button onclick="exportPDF()" class="nav-btn bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold shadow-md">تصدير التقرير 📄</button>
                <button id="resetCurrentLab" onclick="secureSpecificReset()" class="nav-btn bg-red-50 text-red-600 px-6 py-2 rounded-xl font-bold border border-red-100">تصفير مشفر 🗑️</button>
                <button onclick="location.reload()" class="nav-btn bg-slate-100 px-6 py-2 rounded-xl font-bold">خروج آمن</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <aside id="tSide" class="lg:col-span-4 space-y-6">
                <div class="glass-card p-8 space-y-5">
                    <h3 class="font-black text-indigo-800 border-r-4 border-indigo-600 pr-3">تخصيص نظام التفكير</h3>
                    <select id="tType" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 ring-indigo-500 bg-slate-50">
                        <option value="grammar">نظام التفكير النحوي</option>
                        <option value="analyze">نظام التفكير التحليلي</option>
                        <option value="logic">نظام التفكير المنطقي</option>
                        <option value="critic">نظام التفكير النقدي</option>
                        <option value="creative">نظام التفكير الإبداعي</option>
                        <option value="history">نظام التفكير التاريخي</option>
                    </select>
                    <textarea id="tQ" class="w-full p-4 border rounded-2xl h-24 focus:ring-2 ring-indigo-500 outline-none" placeholder="اكتبي التحدي الفكري هنا..."></textarea>
                    
                    <!-- إضافة نظام الكلمات المفتاحية -->
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500">الكلمات المفتاحية (للتصحيح التلقائي - افصلي بفاصلة):</label>
                        <input id="tKeywords" type="text" class="w-full p-3 border rounded-xl text-sm outline-none focus:ring-2 ring-indigo-300" placeholder="مثال: تحليل، منطق، استنتاج">
                    </div>

                    <button onclick="publishMission()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition-colors">نشر المهمة للطالبات 📡</button>
                </div>
                <div class="glass-card p-8 h-80">
                    <canvas id="gradeChart"></canvas>
                </div>
            </aside>

            <section class="lg:col-span-8 glass-card p-6 overflow-hidden" id="reportArea">
                <div class="overflow-x-auto">
                    <table class="w-full text-right">
                        <thead>
                            <tr class="text-slate-400 border-b-2 border-slate-50">
                                <th class="p-4 text-sm uppercase tracking-wider">الطالبة</th>
                                <th class="p-4 text-sm uppercase tracking-wider">الحالة</th>
                                <th class="p-4 text-sm uppercase tracking-wider">الدرجة / 10</th>
                                <th class="p-4 text-sm uppercase tracking-wider">السجل</th>
                            </tr>
                        </thead>
                        <tbody id="tTable"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <!-- واجهة الطالبة -->
    <div id="studentPanel" class="hidden max-w-3xl mx-auto py-10">
        <div class="glass-card p-12 space-y-8 border-t-[20px] border-indigo-600 shadow-2xl">
            <div class="text-center space-y-4">
                <span id="sCategory" class="px-4 py-1 bg-indigo-100 text-indigo-700 rounded-full text-sm font-bold uppercase tracking-widest"></span>
                <h2 id="sQ" class="text-3xl font-black text-slate-800 leading-tight">...</h2>
            </div>
            
            <div id="sInputArea" class="space-y-6">
                <input id="sName" placeholder="اكتبي اسمكِ الثلاثي" class="w-full p-6 border-2 rounded-3xl text-xl outline-none focus:border-indigo-500 transition-all shadow-sm">
                <textarea id="sAns" onpaste="interceptPaste(event)" onfocus="startCounter()" class="w-full p-6 border-2 rounded-3xl h-64 text-lg outline-none focus:border-indigo-400 shadow-sm" placeholder="اكتبي تحليلكِ الخاص هنا..."></textarea>
                <button onclick="processSubmission()" class="w-full py-6 bg-indigo-600 text-white rounded-[2rem] font-black text-2xl shadow-xl hover:bg-indigo-700 transition-all">إرسال التحليل 📩</button>
            </div>

            <div id="sCoachArea" class="hidden bg-slate-50 p-10 rounded-[3rem] border-2 border-dashed border-indigo-200 space-y-8">
                <h4 class="text-indigo-900 font-black text-xl italic">💡 رائع! دعينا نطور تفكيركِ بالخطوات التالية:</h4>
                <div id="coachSteps" class="space-y-4"></div>
                <textarea id="sFinalEdit" onpaste="interceptPaste(event)" class="w-full p-6 border-2 border-indigo-200 rounded-3xl h-40 outline-none shadow-inner" placeholder="الآن صغي إجابتكِ النهائية بأسلوبكِ الخاص..."></textarea>
                <button onclick="finalSubmit()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-bold text-xl shadow-lg hover:bg-emerald-700">تأكيد الإرسال النهائي ✨</button>
            </div>
        </div>
    </div>

<script>
let currentLab = 0;
let isReadOnly = false;
let startTime = 0;
let gradeChart = null;
const MASTER_KEY = "9999"; 

function secureMasterReset() {
    const pass = prompt("أدخلي كلمة مرور التصفير الشامل (المديرة):");
    if(pass === MASTER_KEY) {
        if(confirm("⚠️ سيتم مسح المنصة بالكامل. هل أنتِ متأكدة؟")) {
            localStorage.clear();
            alert("تم التصفير بنجاح.");
            location.reload();
        }
    } else {
        alert("كلمة المرور خاطئة!");
    }
}

function secureSpecificReset() {
    const pin = prompt(`لتصفير مختبر ${currentLab}، أدخلي الكود الخاص به:`);
    if(pin == (parseInt(currentLab) + 100)) {
        localStorage.removeItem(`V21_DATA_${currentLab}`);
        localStorage.setItem(`LOCKED_V21_${currentLab}`, 'false');
        alert("تم تصفير المختبر وفك الحجز.");
        location.reload();
    } else {
        alert("كود خاطئ! لا يمكن التصفير.");
    }
}

function autoClearStudentSession() {
    document.getElementById('sName').value = "";
    document.getElementById('sAns').value = "";
    document.getElementById('sFinalEdit').value = "";
    startTime = 0;
}

function refreshSelectionUI() {
    currentLab = document.getElementById('labSelect').value;
    const area = document.getElementById('actionArea');
    if(!currentLab) return area.classList.add('hidden');
    
    area.classList.remove('hidden');
    const isLocked = localStorage.getItem(`LOCKED_V21_${currentLab}`) === 'true';
    
    area.innerHTML = isLocked ? `
        <button onclick="startStudentMode()" class="nav-btn w-full py-6 bg-emerald-500 text-white rounded-3xl font-black text-xl shadow-xl">دخول الطالبة 🎓</button>
        <button onclick="startTeacherMode(true)" class="nav-btn w-full py-4 bg-white text-indigo-600 rounded-2xl font-bold border-2 border-indigo-50 mt-2">متابعة النتائج (قراءة فقط)</button>
    ` : `
        <button onclick="startTeacherMode(false)" class="nav-btn w-full py-6 bg-indigo-600 text-white rounded-3xl font-black text-xl shadow-xl">حجز المختبر ودخول المعلمة 👩‍🔬</button>
    `;
}

function startTeacherMode(readOnly) {
    if(!readOnly) {
        const pin = prompt(`أدخلي كود تفعيل مختبر ${currentLab}:`);
        if(pin != (parseInt(currentLab) + 100)) return alert("الكود غير صحيح!");
        localStorage.setItem(`LOCKED_V21_${currentLab}`, 'true');
    }
    isReadOnly = readOnly;
    document.getElementById('selectionScreen').classList.add('hidden');
    document.getElementById('teacherPanel').classList.remove('hidden');
    document.getElementById('tLabNum').innerText = currentLab;
    
    // استعادة الكلمات المفتاحية والسؤال عند الدخول
    const data = JSON.parse(localStorage.getItem(`V21_DATA_${currentLab}`) || '{"q":"","keywords":""}');
    document.getElementById('tQ').value = data.q || "";
    document.getElementById('tKeywords').value = data.keywords || "";

    if(isReadOnly) {
        document.getElementById('tSide').classList.add('opacity-50', 'pointer-events-none');
        document.getElementById('resetCurrentLab').classList.add('hidden');
    }
    
    setInterval(updateTeacherDashboard, 1000);
}

function startStudentMode() {
    document.getElementById('selectionScreen').classList.add('hidden');
    document.getElementById('studentPanel').classList.remove('hidden');
    setInterval(() => {
        const data = JSON.parse(localStorage.getItem(`V21_DATA_${currentLab}`) || '{"q":"لا يوجد سؤال حالياً"}');
        document.getElementById('sQ').innerText = data.q;
        document.getElementById('sCategory').innerText = data.type || "عام";
    }, 1000);
}

function interceptPaste(e) {
    e.preventDefault();
    const pastedText = (e.clipboardData || window.clipboardData).getData('text');
    const name = document.getElementById('sName').value || "طالبة غير معروفة";
    saveToStorage(name, `🚨 [محاولة لصق]: ${pastedText}`, 'snitched', 0);
    document.getElementById('sInputArea').classList.add('hidden');
    document.getElementById('sCoachArea').classList.remove('hidden');
    generateCoachSteps();
}

function startCounter() { if(startTime === 0) startTime = Date.now(); }

// نظام التصحيح التلقائي الذكي
function calculateAutomaticGrade(answer, keywordsStr) {
    if (!keywordsStr) return 10; // إذا لم توجد كلمات مفتاحية، تعطى الدرجة بناء على المعايير السابقة
    
    const keywords = keywordsStr.split(',').map(k => k.trim().toLowerCase()).filter(k => k !== "");
    if (keywords.length === 0) return 10;

    const lowerAns = answer.toLowerCase();
    let matchCount = 0;
    
    keywords.forEach(word => {
        if (lowerAns.includes(word)) matchCount++;
    });

    const matchRatio = matchCount / keywords.length;
    // الدرجة من 10 (الحد الأدنى 4 إذا كانت الإجابة طويلة والحد الأقصى 10)
    let finalGrade = Math.round(matchRatio * 10);
    return Math.max(finalGrade, 2); // ضمان عدم نزول الدرجة عن 2 إذا كتبت شيئاً
}

function processSubmission() {
    const ans = document.getElementById('sAns').value;
    const name = document.getElementById('sName').value;
    if(!name || !ans) return alert("يرجى إكمال البيانات!");
    
    const data = JSON.parse(localStorage.getItem(`V21_DATA_${currentLab}`));
    const words = ans.trim().split(/\s+/).length;
    const timeTaken = (Date.now() - startTime) / 1000;

    // كشف الذكاء الاصطناعي أو السرعة المفرطة
    if(timeTaken < (words * 0.7) && words > 5) {
        document.getElementById('sInputArea').classList.add('hidden');
        document.getElementById('sCoachArea').classList.remove('hidden');
        generateCoachSteps();
        saveToStorage(name, ans, 'ai', 2);
    } else {
        const autoGrade = calculateAutomaticGrade(ans, data.keywords);
        saveToStorage(name, ans, 'human', autoGrade);
        autoClearStudentSession();
        alert(`تم استلام تحليلكِ بنجاح! درجتكِ التلقائية: ${autoGrade}/10`); 
        location.reload();
    }
}

function generateCoachSteps() {
    const data = JSON.parse(localStorage.getItem(`V21_DATA_${currentLab}`));
    const type = data.type;
    const library = {
        grammar: ["ما هي الوظيفة النحوية للكلمة؟", "ما الحركة الإعرابية المناسبة؟"],
        logic: ["رتبي المعطيات أولاً.", "ما هي القاعدة المنطقية التي استخدمتها؟"],
        creative: ["ماذا لو تغيرت الظروف؟", "ابتكري نهاية بديلة للقصة."],
        analyze: ["ما هي الفكرة الأساسية؟", "اربطي بين الأدلة والنتائج."]
    };
    const steps = library[type] || ["فكري في السؤال بطريقة نقدية.", "صغي إجابتكِ بأسلوبكِ الخاص."];
    document.getElementById('coachSteps').innerHTML = steps.map(s => `<div class='bg-white p-4 border-r-4 border-indigo-600 rounded-xl shadow-sm font-bold'>${s}</div>`).join('');
}

function finalSubmit() {
    const data = JSON.parse(localStorage.getItem(`V21_DATA_${currentLab}`));
    const finalAns = document.getElementById('sFinalEdit').value;
    const studentName = document.getElementById('sName').value; // يحتاج للتحسين لجلب الاسم الصحيح
    
    // البحث عن الطالبة في القائمة
    const studentIdx = data.s.findIndex(s => s.status === 'ai' || s.status === 'snitched');
    const autoGrade = calculateAutomaticGrade(finalAns, data.keywords);
    
    if (studentIdx > -1) {
        data.s[studentIdx].status = 'coached';
        data.s[studentIdx].final = finalAns;
        data.s[studentIdx].grade = autoGrade;
    }
    
    localStorage.setItem(`V21_DATA_${currentLab}`, JSON.stringify(data));
    autoClearStudentSession();
    alert("رائع! تم إرسال النسخة المطورة.");
    location.reload();
}

function saveToStorage(n, a, st, g) {
    const key = `V21_DATA_${currentLab}`;
    const data = JSON.parse(localStorage.getItem(key)) || {s: []};
    const idx = data.s.findIndex(x => x.name === n);
    if(idx > -1) { 
        data.s[idx].status = st; 
        data.s[idx].ans = a; 
        data.s[idx].grade = g;
    }
    else { data.s.push({ name: n, ans: a, status: st, grade: g }); }
    localStorage.setItem(key, JSON.stringify(data));
}

function updateTeacherDashboard() {
    const data = JSON.parse(localStorage.getItem(`V21_DATA_${currentLab}`) || '{"s":[]}');
    const tbody = document.getElementById('tTable');
    tbody.innerHTML = data.s.map((s, i) => `
        <tr class="border-b transition-colors ${s.status == 'snitched' ? 'bg-red-50' : 'hover:bg-slate-50'}">
            <td class="p-4 font-bold text-slate-700">${s.name}</td>
            <td class="p-4">
                <span class="px-3 py-1 rounded-full text-[10px] font-bold ${s.status == 'snitched' ? 'bg-red-600 text-white' : (s.status == 'ai' ? 'bg-amber-100 text-amber-700' : (s.status == 'coached' ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-700'))}">
                    ${s.status == 'snitched' ? '🚨 محاولة غش' : (s.status == 'ai' ? 'ذكاء محتمل' : (s.status == 'coached' ? 'تم التوجيه' : 'بشري ✅'))}
                </span>
            </td>
            <td class="p-4"><input type="number" value="${s.grade}" ${isReadOnly ? 'disabled' : ''} class="w-12 text-center bg-transparent border-b font-bold" onchange="updateGrade(${i}, this.value)"></td>
            <td class="p-4"><button onclick="viewLog(${i})" class="text-indigo-500 underline text-xs font-bold">فتح السجل</button></td>
        </tr>
    `).join('');
    drawChart(data.s);
}

function viewLog(i) {
    const data = JSON.parse(localStorage.getItem(`V21_DATA_${currentLab}`));
    const s = data.s[i];
    alert(`سجل الطالبة: ${s.name}\n\nالإجابة الأصلية/الدليل:\n${s.ans}\n\nالإجابة النهائية المطورة:\n${s.final || 'لم تكتمل'}`);
}

function drawChart(students) {
    const ctx = document.getElementById('gradeChart').getContext('2d');
    const stats = [0, 0, 0, 0];
    students.forEach(s => {
        if(s.grade >= 9) stats[0]++;
        else if(s.grade >= 7) stats[1]++;
        else if(s.grade >= 5) stats[2]++;
        else stats[3]++;
    });
    if(gradeChart) gradeChart.destroy();
    gradeChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: ['9-10', '7-8', '5-6', '<5'], datasets: [{ label: 'توزيع الدرجات', data: stats, backgroundColor: '#4f46e5', borderRadius: 8 }] },
        options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
    });
}

function publishMission() {
    const q = document.getElementById('tQ').value;
    const type = document.getElementById('tType').value;
    const keywords = document.getElementById('tKeywords').value;
    if(!q) return alert("اكتبي السؤال أولاً!");
    
    // الاحتفاظ بالبيانات السابقة للطالبات عند تحديث السؤال
    const existingData = JSON.parse(localStorage.getItem(`V21_DATA_${currentLab}`) || '{"s":[]}');
    localStorage.setItem(`V21_DATA_${currentLab}`, JSON.stringify({
        q, 
        type, 
        keywords, 
        s: existingData.s 
    }));
    alert("تم نشر المهمة وتحديث معايير التصحيح! 📡");
}

function updateGrade(i, v) {
    const data = JSON.parse(localStorage.getItem(`V21_DATA_${currentLab}`));
    data.s[i].grade = v;
    localStorage.setItem(`V21_DATA_${currentLab}`, JSON.stringify(data));
}

function exportPDF() {
    const { jsPDF } = window.jspdf;
    html2canvas(document.getElementById('reportArea')).then(canvas => {
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text(`تقرير مختبر عقول تصنع - رقم ${currentLab}`, 10, 20);
        doc.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 30, 190, 0);
        doc.save(`Results_Lab_${currentLab}.pdf`);
    });
}
</script>
</body>
</html>
